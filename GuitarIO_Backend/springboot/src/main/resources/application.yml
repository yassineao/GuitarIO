spring:
  datasource:
    url: ${URLDATABASE}
    username: ${PGDATABASE}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      keepaliveTime: 300000   # 5 min
      idle-timeout: 600000    # 10 min

  jpa:
    hibernate:
      ddl-auto: update        # dev only; prefer migrations later
    show-sql: true            # helpful for debugging
    open-in-view: false
    properties:
      hibernate.format_sql: true
      # dialect is optional; Hibernate detects Postgres automatically, but you can keep it:
      # hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

